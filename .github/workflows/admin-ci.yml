name: Admin Dashboard CI

on:
  push:
    branches: [main, development]
    paths:
      - 'admin_dashboard/**'
      - '.github/workflows/admin-ci.yml'
  pull_request:
    branches: [main, development]
    paths:
      - 'admin_dashboard/**'
      - '.github/workflows/admin-ci.yml'

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin_dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: admin_dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          VITE_API_BASE_URL: http://localhost:3000/api/v1
          VITE_FIREBASE_API_KEY: test-api-key
          VITE_FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: test-project
          VITE_FIREBASE_STORAGE_BUCKET: test.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '123456789'
          VITE_FIREBASE_APP_ID: '1:123456789:web:test'

      - name: Build for production
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.royaltransportation.com/v1
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: admin-dashboard-dist
          path: admin_dashboard/dist/
          retention-days: 7
